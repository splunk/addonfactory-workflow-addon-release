name: test-split 
on:
  workflow_call:
    inputs: 
      matrixvalues:
        description: 'Stringified JSON object listing target Node versions'
        default: ''
        required: false
        type: string
jobs:
  split-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: 
        splitvalues: ${{fromJson(inputs.matrixvalues)}}
    steps:
      - run: echo "hello"
        shell: bash
      - run: echo ${{ matrix.splitvalues }}
        shell: bash
        
