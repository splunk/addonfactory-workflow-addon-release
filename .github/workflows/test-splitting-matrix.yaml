name: test-split 
on:
  workflow_call:
    inputs: 
      matrixvalues:
        description: 'Stringified JSON object listing target Node versions'
        default: '15.x'
        required: false
        type: string
      marker_list:
        description: 'marker list'
        default: ''
        required: false
        type: string
      test-timeout:
        required: false
        type: number
        default: 120
      marker_string:
        required: false
        type: string
        default: "tag"
jobs:
  run-mod-inputs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: 
        splitvalues: ${{fromJson(inputs.matrixvalues)}}
        marker_List: ${{fromJson(inputs.marker_list)}}
        test-timeout:
        - ${{ inputs.test-timeout }}
        #marker_String: ${{fromJson(inputs.marker_string)}}
    steps:
      - run: echo "hello"
        shell: bash
      - run: echo ${{ matrix.splitvalues }}
        shell: bash
        
