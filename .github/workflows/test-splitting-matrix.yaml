name: test-split 
on:
  workflow_call:
    inputs: 
      matrixvalues:
        description: 'Stringified JSON object listing target Node versions'
        default: '15.x'
        required: false
        type: string
      marker:
        description: 'marker string'
        default: ''
        required: false
        type: string
      test-timeout:
        required: false
        type: number
        default: 120
      marker_string:
        required: false
        type: string
        default: ''
jobs:
  split-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: 
        splitvalues: ${{fromJson(inputs.matrixvalues)}}
        marker: ${{fromJson(inputs.marker)}}
        marker_String: ${{inputs.marker_string}}
        test-timeout: ${{ inputs.test-timeout }}
        
    steps:
      - run: echo "hello"
        shell: bash
      - run: echo ${{ matrix.splitvalues }}
        shell: bash
        
