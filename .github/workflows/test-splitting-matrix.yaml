name: test-split 
on:
  workflow_call:
    inputs: 
      matrixvalues:
        description: 'Stringified JSON object listing target Node versions'
        default: '15.x'
        required: false
        type: string
      marker_list:
        description: 'marker list'
        default: >-
          [" "]
        required: false
        type: string
      test-timeout:
        required: false
        type: number
        default: 120
      marker_string:
        required: false
        type: string
        default: ''
